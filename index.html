<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет смен</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }
        input {
            background-color: #333;
            color: #fff;
        }
        button {
            background-color: #0088cc;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #006699;
        }
    </style>
</head>
<body>

    <h2>Учет доходов</h2>
    
    <input type="number" id="income" placeholder="Грязный доход">
    <input type="number" id="fuel" placeholder="Заправка">
    
    <button id="send-btn">Сохранить смену</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        document.getElementById('send-btn').addEventListener('click', () => {
            const incomeInput = document.getElementById('income');
            const fuelInput = document.getElementById('fuel');
            
            const income = parseFloat(incomeInput.value);
            const fuel = parseFloat(fuelInput.value);

            if (isNaN(income) || isNaN(fuel)) {
                alert('Заполните поля корректными числами!');
                return;
            }

            // Формируем строку данных для Make (через пробел)
            const data = `${income} ${fuel}`;

            // Отправляем данные в Telegram-бот
            tg.sendData(data);
            
            alert("Данные отправлены в таблицу!");
            
            // Перезагружаем страницу через полсекунды, чтобы обновить интерфейс
            setTimeout(function() {
                location.reload();
            }, 500);
        });
    </script>
</body>
</html>
